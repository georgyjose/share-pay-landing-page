<svg width="360" height="720" viewBox="0 0 360 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="360" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#4F8CFF"/>
    </linearGradient>
    <clipPath id="screen"><rect width="360" height="720" rx="20"/></clipPath>
  </defs>
  <g clip-path="url(#screen)">
    <rect width="360" height="720" fill="#FAFAFE"/>
    <!-- Status bar -->
    <rect width="360" height="48" fill="url(#grad)"/>
    <text x="24" y="32" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="white">9:41</text>
    <!-- Header -->
    <rect y="48" width="360" height="60" fill="url(#grad)"/>
    <text x="24" y="84" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="white" opacity="0.8">← Back</text>
    <text x="132" y="84" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="700" fill="white">Add Expense</text>
    <!-- Amount Section -->
    <rect x="16" y="124" width="328" height="130" rx="16" fill="white" stroke="#E8E8F0" stroke-width="1"/>
    <text x="180" y="162" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#6B6B8D" text-anchor="middle">Amount</text>
    <text x="180" y="218" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="48" font-weight="700" fill="#0F0F1A" text-anchor="middle">$48.00</text>
    <!-- Description -->
    <rect x="16" y="270" width="328" height="56" rx="12" fill="white" stroke="#E8E8F0" stroke-width="1"/>
    <text x="32" y="303" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#0F0F1A">🍕 Pizza Night Dinner</text>
    <!-- Group Selector -->
    <text x="24" y="356" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600" fill="#6B6B8D">GROUP</text>
    <rect x="16" y="366" width="328" height="50" rx="12" fill="white" stroke="#E8E8F0" stroke-width="1"/>
    <text x="32" y="396" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#0F0F1A">✈️ Goa Trip 2026</text>
    <text x="312" y="396" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#6B6B8D">›</text>
    <!-- Category -->
    <text x="24" y="446" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600" fill="#6B6B8D">CATEGORY</text>
    <rect x="16" y="456" width="328" height="50" rx="12" fill="white" stroke="#E8E8F0" stroke-width="1"/>
    <text x="32" y="486" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#0F0F1A">🍔 Food &amp; Drinks</text>
    <text x="312" y="486" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#6B6B8D">›</text>
    <!-- Split -->
    <text x="24" y="536" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600" fill="#6B6B8D">SPLIT BETWEEN</text>
    <rect x="16" y="546" width="328" height="100" rx="12" fill="white" stroke="#E8E8F0" stroke-width="1"/>
    <!-- Split type tabs -->
    <rect x="28" y="556" width="72" height="28" rx="14" fill="url(#grad)"/>
    <text x="48" y="574" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="white">Equal</text>
    <rect x="108" y="556" width="72" height="28" rx="14" fill="#F3F4F6"/>
    <text x="116" y="574" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#6B6B8D">Percent</text>
    <rect x="188" y="556" width="72" height="28" rx="14" fill="#F3F4F6"/>
    <text x="200" y="574" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#6B6B8D">Custom</text>
    <!-- Split members -->
    <text x="32" y="612" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#0F0F1A">4 people × $12.00 each</text>
    <circle cx="32" y="630" r="0" fill="none"/>
    <circle cx="40" cy="630" r="10" fill="#C4B5FD"/>
    <circle cx="64" cy="630" r="10" fill="#93C5FD"/>
    <circle cx="88" cy="630" r="10" fill="#86EFAC"/>
    <circle cx="112" cy="630" r="10" fill="#FCA5A5"/>
    <!-- Add Button -->
    <rect x="16" y="666" width="328" height="48" rx="24" fill="url(#grad)"/>
    <text x="180" y="695" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">Add Expense</text>
  </g>
</svg>
